name: Bug Report
description: Report a reproducible problem in Global Pet Assistant.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction Steps
      description: List the exact steps needed to reproduce the issue.
      placeholder: |
        1. Run ...
        2. Send event ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true
  - type: input
    id: macos
    attributes:
      label: macOS Version
      placeholder: "26.x"
  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs
      description: Review logs for private paths or sensitive data before pasting.
      render: text
